infrastructure:
  servers:
    claudette_production:
      role: Production server for Claudette PRODUCT (Karim's business)
      provider: Hetzner Cloud
      type: CAX41 ARM64
      ip: 178.104.24.23
      domain: claudette.silveroak.one
      location: Nuremberg, Germany
      status: LIVE - DO NOT TOUCH
      cost_monthly_eur: 16
    silver_oak_os_factory:
      role: Internal factory server for Silver Oak OS (Karim's productivity tool)
      provider: Hetzner Cloud
      type: CAX21 ARM64 (rescale to CAX41 when needed)
      ip: 178.104.255.59
      domain: https://os.silveroak.one
      location: Nuremberg, Germany
      status: LIVE - dev environment for Silver Oak OS
      cost_monthly_eur: 10
      created_date: '2026-04-25'
      url_https: https://os.silveroak.one
      url_http_fallback: http://178.104.255.59
      ports:
        nextjs: 3010
        caddy_http: 80
        caddy_https: 443
        node_exporter: 9100
  isolation_rule: Silver Oak OS and Claudette MUST run on physically separate servers. ZERO cross-server dependency. Failure
    on one MUST NOT affect the other.
  total_monthly_cost_eur: 26
  dns:
    registrar: GoDaddy
    ns: ns73/ns74.domaincontrol.com (NOT Hetzner)
    subdomain_os_silveroak_one: 178.104.255.59
  https:
    provider: Caddy v2.11.2 + Let's Encrypt
    cert_authority: Let's Encrypt E7
    cert_expiry: '2026-07-24'
    auto_renewal: true
    headers:
    - HSTS max-age=31536000
    - X-Content-Type-Options nosniff
    - X-Frame-Options DENY
    - Referrer-Policy strict-origin
  vision_sync:
    source: Claudette /app/produits-saas/factory/silver-oak-os/vision/vision.yml
    destination: Factory /app/silver-oak-os/vision/vision.yml
    cron: '*/5 * * * *'
    method: rsync over SSH key dediee (command-forced read-only)
    validation: python3 yaml.safe_load avant ecriture
    backup_policy: _archive/vision.yml.bak.YYYYMMDD-HHMMSS (max 10 conserves)
    direction: unidirectional Claudette to Factory
  monitoring:
    type: cron Telegram alerts
    cron: '*/5 * * * *'
    cooldown_min: 15
    checks:
    - PM2 silver-oak-os-frontend online
    - disk /app >85%
    - Next.js:3010 HTTP 200
    - Caddy systemd active
    - /api/chat non 5xx
    future: Migrate to Prometheus + Grafana when V14 ready
