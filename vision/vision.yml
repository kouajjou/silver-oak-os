karim_context:
  pre_covid: Geared everything by phone. Zero reading. Human team at the other end. Was content.
  current_state: ADHD, dyslexic, voice > text
  preferred_mode: FaceTime virtual with employees
  reading_capacity: minimal — voice and visuals preferred
  post_covid_problem: Forced to read emails, screens, Telegram, Slack. Drowning in text. Lost productivity.
  principles_8:
  - One thing at a time, never disperse
  - Validate before invest
  - Claudette first, Silver Oak OS serves Claudette
  - Zero technical debt
  - Karim's time is the biggest cost
  - Voice > text, visual > reading
  - Trust workers but verify with Playwright
  - Never break Claudette while improving Silver Oak OS
  communication_preference:
    primary: voice
    secondary: visual artifacts (deck, doc, link)
    avoid: long text walls, file lists, generic chatbot replies
